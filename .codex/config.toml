# Project-scoped Codex configuration for the words-v2 monorepo.
#
# Notes:
# - Custom agents live under `.codex/agents/*.toml`.
# - Keep the root session on a stronger coordinating model.
# - Use cheaper slice specialists for delegated work.
# - Avoid lexicon-specific agent defaults at repo root while that tool is still evolving.

model = "gpt-5.4"
model_reasoning_effort = "medium"
review_model = "gpt-5.4"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
service_tier = "fast"

[sandbox_workspace_write]
network_access = true

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 3600

[mcp_servers.notebooklm]
enabled = false
