name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vocabapp
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: vocabapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vocabapp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-test.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://vocabapp:testpass@localhost:5432/vocabapp_test
          DATABASE_URL_SYNC: postgresql://vocabapp:testpass@localhost:5432/vocabapp_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
          JWT_SECRET: test-secret
        run: pytest -q

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  lexicon:
    name: Lexicon Tool (test + smoke)
    runs-on: ubuntu-latest
    env:
      NLTK_DATA: ~/.cache/nltk_data

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            tools/lexicon/requirements.txt
            tools/lexicon/requirements-dev.txt

      - name: Cache WordNet corpora
        uses: actions/cache@v4
        with:
          path: ~/.cache/nltk_data
          key: ${{ runner.os }}-nltk-wordnet-v1

      - name: Install lexicon dependencies
        run: pip install -r tools/lexicon/requirements-dev.txt

      - name: Download WordNet corpora
        run: python -m nltk.downloader -d "$NLTK_DATA" wordnet omw-1.4

      - name: Run lexicon pytest suite
        run: python -m pytest tools/lexicon/tests -q

      - name: Run lexicon smoke flow
        run: |
          set -euo pipefail
          smoke_dir="${RUNNER_TEMP}/lexicon-smoke"
          rm -rf "$smoke_dir"
          mkdir -p "$smoke_dir"
          python -m tools.lexicon.cli build-base run set lead --output-dir "$smoke_dir"
          python -m tools.lexicon.cli enrich --snapshot-dir "$smoke_dir" --provider-mode placeholder
          python -m tools.lexicon.cli validate --snapshot-dir "$smoke_dir"
          python -m tools.lexicon.cli compile-export --snapshot-dir "$smoke_dir" --output "$smoke_dir/words.enriched.jsonl"
          test -f "$smoke_dir/words.enriched.jsonl"

  e2e-smoke:
    name: E2E Smoke (required)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --prefix e2e

      - name: Start app stack (docker compose)
        env:
          POSTGRES_USER: vocabapp
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: vocabapp_dev
          NEXT_PUBLIC_API_URL: http://backend:8000/api
          ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://frontend:3000
        run: |
          docker compose -f docker-compose.yml --profile tests up -d --build postgres redis backend worker frontend

      - name: Wait for backend and frontend
        run: |
          set -euo pipefail

          backend_ready=0
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/api/health >/dev/null 2>&1; then
              backend_ready=1
              break
            fi
            sleep 2
          done
          if [ "${backend_ready}" -ne 1 ]; then
            echo "Backend health endpoint did not become ready in time."
            docker compose -f docker-compose.yml --profile tests logs --tail=200 backend
            exit 1
          fi

          frontend_ready=0
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/register >/dev/null 2>&1; then
              frontend_ready=1
              break
            fi
            sleep 2
          done
          if [ "${frontend_ready}" -ne 1 ]; then
            echo "Frontend did not become ready in time."
            docker compose -f docker-compose.yml --profile tests logs --tail=200 frontend
            exit 1
          fi

      - name: Apply migrations
        run: docker compose -f docker-compose.yml exec -T backend alembic upgrade head

      - name: Run Playwright smoke tests
        env:
          E2E_DB_URL: postgresql://vocabapp:devpassword@postgres:5432/vocabapp_dev
        run: |
          docker compose -f docker-compose.yml --profile tests run --rm --no-deps \
            -e E2E_BASE_URL=http://frontend:3000 \
            -e E2E_API_URL=http://backend:8000/api \
            -e E2E_DB_URL=${E2E_DB_URL} \
            playwright sh -lc "cd /workspace/e2e && npm run test:smoke:ci"

      - name: Upload Playwright smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

      - name: Tear down app stack
        if: always()
        run: docker compose -f docker-compose.yml --profile tests down -v --remove-orphans

  e2e-full:
    name: E2E Full
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [e2e-smoke]
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --prefix e2e

      - name: Start app stack (docker compose)
        env:
          POSTGRES_USER: vocabapp
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: vocabapp_dev
          NEXT_PUBLIC_API_URL: http://backend:8000/api
          ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://frontend:3000
        run: |
          docker compose -f docker-compose.yml --profile tests up -d --build postgres redis backend worker frontend

      - name: Wait for backend and frontend
        run: |
          set -euo pipefail

          backend_ready=0
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/api/health >/dev/null 2>&1; then
              backend_ready=1
              break
            fi
            sleep 2
          done
          if [ "${backend_ready}" -ne 1 ]; then
            echo "Backend health endpoint did not become ready in time."
            docker compose -f docker-compose.yml --profile tests logs --tail=200 backend
            exit 1
          fi

          frontend_ready=0
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/register >/dev/null 2>&1; then
              frontend_ready=1
              break
            fi
            sleep 2
          done
          if [ "${frontend_ready}" -ne 1 ]; then
            echo "Frontend did not become ready in time."
            docker compose -f docker-compose.yml --profile tests logs --tail=200 frontend
            exit 1
          fi

      - name: Apply migrations
        run: docker compose -f docker-compose.yml exec -T backend alembic upgrade head

      - name: Run Playwright full suite
        env:
          E2E_DB_URL: postgresql://vocabapp:devpassword@postgres:5432/vocabapp_dev
        run: |
          docker compose -f docker-compose.yml --profile tests run --rm --no-deps \
            -e E2E_BASE_URL=http://frontend:3000 \
            -e E2E_API_URL=http://backend:8000/api \
            -e E2E_DB_URL=${E2E_DB_URL} \
            playwright sh -lc "cd /workspace/e2e && npm run test:full"

      - name: Upload Playwright full artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-artifacts
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

      - name: Tear down app stack
        if: always()
        run: docker compose -f docker-compose.yml --profile tests down -v --remove-orphans
