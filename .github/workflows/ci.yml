  e2e-full-gate:
    name: E2E Full (required)
    runs-on: ubuntu-latest
    needs: [e2e-admin, e2e-user]
    if: always()

    steps:
      - name: Fail if admin or user E2E failed
        env:
          ADMIN_RESULT: ${{ needs.e2e-admin.result }}
          USER_RESULT: ${{ needs.e2e-user.result }}
        run: |
          set -euo pipefail
          if [ "${ADMIN_RESULT}" != "success" ] || [ "${USER_RESULT}" != "success" ]; then
            echo "Admin result: ${ADMIN_RESULT}"
            echo "User result: ${USER_RESULT}"
            exit 1
          fi
