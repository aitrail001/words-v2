name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_PROJECT_NAME: words-gate-stack
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_PORT: 55432
  REDIS_PORT: 56379
  TEST_DB_NAME: vocabapp_test_full
  TEST_INTERNAL_API_URL: http://backend:8000/api
  TEST_BACKEND_PORT: 18000
  TEST_PUBLIC_PORT: 18088
  TEST_ADMIN_PORT: 13001
  WORDS_DATA_DIR: ./data
  ENVIRONMENT: test
  DEV_TEST_USERS_ENABLED: "true"
  JWT_SECRET: test-secret
  LOG_LEVEL: INFO
  CELERY_QUEUES: default,imports
  ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://frontend:3000,http://admin-frontend:3001
  E2E_BASE_URL: http://frontend:3000
  E2E_API_URL: http://backend:8000/api
  E2E_ADMIN_URL: http://admin-frontend:3001

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-test.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Write gate env file
        working-directory: .
        run: |
          cat > .env.stack.gate <<EOF
          COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          REDIS_PORT=${REDIS_PORT}

          TEST_DB_NAME=${TEST_DB_NAME}

          TEST_BACKEND_PORT=${TEST_BACKEND_PORT}
          TEST_PUBLIC_PORT=${TEST_PUBLIC_PORT}
          TEST_ADMIN_PORT=${TEST_ADMIN_PORT}

          WORDS_DATA_DIR=${WORDS_DATA_DIR}
          TEST_INTERNAL_API_URL=${TEST_INTERNAL_API_URL}

          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          REDIS_URL=redis://redis:6379/0

          ENVIRONMENT=${ENVIRONMENT}
          DEV_TEST_USERS_ENABLED=${DEV_TEST_USERS_ENABLED}
          JWT_SECRET=${JWT_SECRET}
          LOG_LEVEL=${LOG_LEVEL}
          CELERY_QUEUES=${CELERY_QUEUES}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

          E2E_BASE_URL=${E2E_BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_ADMIN_URL=${E2E_ADMIN_URL}
          EOF

      - name: Bootstrap backend venv
        working-directory: .
        run: |
          python -m venv .venv-backend
          ./.venv-backend/bin/pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Backend subset
        working-directory: .
        run: ./scripts/ci/run-backend-suite.sh subset

      - name: Backend full
        working-directory: .
        run: ./scripts/ci/run-backend-suite.sh full

      - name: Upload backend artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: backend-ci-artifacts
          path: |
            artifacts/ci-gate/backend-subset
            artifacts/ci-gate/backend-full
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write gate env file
        working-directory: .
        run: |
          cat > .env.stack.gate <<EOF
          COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          REDIS_PORT=${REDIS_PORT}

          TEST_DB_NAME=${TEST_DB_NAME}

          TEST_BACKEND_PORT=${TEST_BACKEND_PORT}
          TEST_PUBLIC_PORT=${TEST_PUBLIC_PORT}
          TEST_ADMIN_PORT=${TEST_ADMIN_PORT}

          WORDS_DATA_DIR=${WORDS_DATA_DIR}
          TEST_INTERNAL_API_URL=${TEST_INTERNAL_API_URL}

          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          REDIS_URL=redis://redis:6379/0

          ENVIRONMENT=${ENVIRONMENT}
          DEV_TEST_USERS_ENABLED=${DEV_TEST_USERS_ENABLED}
          JWT_SECRET=${JWT_SECRET}
          LOG_LEVEL=${LOG_LEVEL}
          CELERY_QUEUES=${CELERY_QUEUES}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

          E2E_BASE_URL=${E2E_BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_ADMIN_URL=${E2E_ADMIN_URL}
          EOF

      - name: Frontend full gate
        working-directory: .
        run: ./scripts/ci/run-frontend-suite.sh full

  admin-frontend:
    name: Admin Frontend (lint + test + build)
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: admin-frontend

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write gate env file
        working-directory: .
        run: |
          cat > .env.stack.gate <<EOF
          COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          REDIS_PORT=${REDIS_PORT}

          TEST_DB_NAME=${TEST_DB_NAME}

          TEST_BACKEND_PORT=${TEST_BACKEND_PORT}
          TEST_PUBLIC_PORT=${TEST_PUBLIC_PORT}
          TEST_ADMIN_PORT=${TEST_ADMIN_PORT}

          WORDS_DATA_DIR=${WORDS_DATA_DIR}
          TEST_INTERNAL_API_URL=${TEST_INTERNAL_API_URL}

          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          REDIS_URL=redis://redis:6379/0

          ENVIRONMENT=${ENVIRONMENT}
          DEV_TEST_USERS_ENABLED=${DEV_TEST_USERS_ENABLED}
          JWT_SECRET=${JWT_SECRET}
          LOG_LEVEL=${LOG_LEVEL}
          CELERY_QUEUES=${CELERY_QUEUES}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

          E2E_BASE_URL=${E2E_BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_ADMIN_URL=${E2E_ADMIN_URL}
          EOF

      - name: Admin frontend full gate
        working-directory: .
        run: ./scripts/ci/run-admin-suite.sh full

  lexicon:
    name: Lexicon Tool (test + smoke)
    runs-on: ubuntu-24.04
    env:
      NLTK_DATA: ~/.cache/nltk_data

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            tools/lexicon/requirements.txt
            tools/lexicon/requirements-dev.txt

      - name: Cache WordNet corpora
        uses: actions/cache@v5.0.4
        with:
          path: ~/.cache/nltk_data
          key: ${{ runner.os }}-nltk-wordnet-v1

      - name: Install lexicon dependencies
        run: pip install -r tools/lexicon/requirements-dev.txt
      - name: Install shared backend model dependencies
        run: pip install -r backend/requirements.txt

      - name: Download WordNet corpora
        run: python -m nltk.downloader -d "$NLTK_DATA" wordnet omw-1.4

      - name: Write gate env file
        working-directory: .
        run: |
          cat > .env.stack.gate <<EOF
          COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          REDIS_PORT=${REDIS_PORT}

          TEST_DB_NAME=${TEST_DB_NAME}

          TEST_BACKEND_PORT=${TEST_BACKEND_PORT}
          TEST_PUBLIC_PORT=${TEST_PUBLIC_PORT}
          TEST_ADMIN_PORT=${TEST_ADMIN_PORT}

          WORDS_DATA_DIR=${WORDS_DATA_DIR}
          TEST_INTERNAL_API_URL=${TEST_INTERNAL_API_URL}

          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          REDIS_URL=redis://redis:6379/0

          ENVIRONMENT=${ENVIRONMENT}
          DEV_TEST_USERS_ENABLED=${DEV_TEST_USERS_ENABLED}
          JWT_SECRET=${JWT_SECRET}
          LOG_LEVEL=${LOG_LEVEL}
          CELERY_QUEUES=${CELERY_QUEUES}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

          E2E_BASE_URL=${E2E_BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_ADMIN_URL=${E2E_ADMIN_URL}
          EOF

      - name: Lexicon gate
        working-directory: .
        run: ./scripts/ci/run-lexicon-suite.sh gate

  e2e-smoke:
    name: E2E Smoke (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [backend, frontend, admin-frontend, lexicon]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --prefix e2e

      - name: Write gate env file
        working-directory: .
        run: |
          cat > .env.stack.gate <<EOF
          COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          REDIS_PORT=${REDIS_PORT}

          TEST_DB_NAME=${TEST_DB_NAME}

          TEST_BACKEND_PORT=${TEST_BACKEND_PORT}
          TEST_PUBLIC_PORT=${TEST_PUBLIC_PORT}
          TEST_ADMIN_PORT=${TEST_ADMIN_PORT}

          WORDS_DATA_DIR=${WORDS_DATA_DIR}
          TEST_INTERNAL_API_URL=${TEST_INTERNAL_API_URL}

          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          REDIS_URL=redis://redis:6379/0

          ENVIRONMENT=${ENVIRONMENT}
          DEV_TEST_USERS_ENABLED=${DEV_TEST_USERS_ENABLED}
          JWT_SECRET=${JWT_SECRET}
          LOG_LEVEL=${LOG_LEVEL}
          CELERY_QUEUES=${CELERY_QUEUES}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

          E2E_BASE_URL=${E2E_BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_ADMIN_URL=${E2E_ADMIN_URL}
          EOF

      - name: Run Playwright smoke suite
        working-directory: .
        run: ENV_FILE=.env.stack.gate ./scripts/ci/run-e2e-suite.sh smoke

      - name: Upload Playwright smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-smoke-artifacts
          path: |
            artifacts/ci-gate/e2e-smoke
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

  e2e-review-srs:
    name: E2E Review + SRS Scenarios (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [e2e-smoke]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --prefix e2e

      - name: Write gate env file
        working-directory: .
        run: |
          cat > .env.stack.gate <<EOF
          COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          REDIS_PORT=${REDIS_PORT}

          TEST_DB_NAME=${TEST_DB_NAME}

          TEST_BACKEND_PORT=${TEST_BACKEND_PORT}
          TEST_PUBLIC_PORT=${TEST_PUBLIC_PORT}
          TEST_ADMIN_PORT=${TEST_ADMIN_PORT}

          WORDS_DATA_DIR=${WORDS_DATA_DIR}
          TEST_INTERNAL_API_URL=${TEST_INTERNAL_API_URL}

          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          REDIS_URL=redis://redis:6379/0

          ENVIRONMENT=${ENVIRONMENT}
          DEV_TEST_USERS_ENABLED=${DEV_TEST_USERS_ENABLED}
          JWT_SECRET=${JWT_SECRET}
          LOG_LEVEL=${LOG_LEVEL}
          CELERY_QUEUES=${CELERY_QUEUES}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

          E2E_BASE_URL=${E2E_BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_ADMIN_URL=${E2E_ADMIN_URL}
          EOF

      - name: Run Playwright review + SRS suite
        working-directory: .
        run: ENV_FILE=.env.stack.gate ./scripts/ci/run-e2e-suite.sh review-srs

      - name: Upload Playwright review + SRS artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-review-srs-artifacts
          path: |
            artifacts/ci-gate/e2e-review-srs
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

  e2e-admin:
    name: E2E Admin (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [e2e-smoke]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --prefix e2e

      - name: Write gate env file
        working-directory: .
        run: |
          cat > .env.stack.gate <<EOF
          COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          REDIS_PORT=${REDIS_PORT}

          TEST_DB_NAME=${TEST_DB_NAME}

          TEST_BACKEND_PORT=${TEST_BACKEND_PORT}
          TEST_PUBLIC_PORT=${TEST_PUBLIC_PORT}
          TEST_ADMIN_PORT=${TEST_ADMIN_PORT}

          WORDS_DATA_DIR=${WORDS_DATA_DIR}
          TEST_INTERNAL_API_URL=${TEST_INTERNAL_API_URL}

          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          REDIS_URL=redis://redis:6379/0

          ENVIRONMENT=${ENVIRONMENT}
          DEV_TEST_USERS_ENABLED=${DEV_TEST_USERS_ENABLED}
          JWT_SECRET=${JWT_SECRET}
          LOG_LEVEL=${LOG_LEVEL}
          CELERY_QUEUES=${CELERY_QUEUES}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

          E2E_BASE_URL=${E2E_BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_ADMIN_URL=${E2E_ADMIN_URL}
          EOF

      - name: Run Playwright admin suite
        working-directory: .
        run: ENV_FILE=.env.stack.gate ./scripts/ci/run-e2e-suite.sh admin

      - name: Upload Playwright admin artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-admin-artifacts
          path: |
            artifacts/ci-gate/e2e-admin
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

  e2e-user:
    name: E2E User (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [e2e-smoke]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --prefix e2e

      - name: Write gate env file
        working-directory: .
        run: |
          cat > .env.stack.gate <<EOF
          COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          REDIS_PORT=${REDIS_PORT}

          TEST_DB_NAME=${TEST_DB_NAME}

          TEST_BACKEND_PORT=${TEST_BACKEND_PORT}
          TEST_PUBLIC_PORT=${TEST_PUBLIC_PORT}
          TEST_ADMIN_PORT=${TEST_ADMIN_PORT}

          WORDS_DATA_DIR=${WORDS_DATA_DIR}
          TEST_INTERNAL_API_URL=${TEST_INTERNAL_API_URL}

          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_DB_NAME}
          REDIS_URL=redis://redis:6379/0

          ENVIRONMENT=${ENVIRONMENT}
          DEV_TEST_USERS_ENABLED=${DEV_TEST_USERS_ENABLED}
          JWT_SECRET=${JWT_SECRET}
          LOG_LEVEL=${LOG_LEVEL}
          CELERY_QUEUES=${CELERY_QUEUES}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

          E2E_BASE_URL=${E2E_BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_ADMIN_URL=${E2E_ADMIN_URL}
          EOF

      - name: Run Playwright user suite
        working-directory: .
        run: ENV_FILE=.env.stack.gate ./scripts/ci/run-e2e-suite.sh user

      - name: Upload Playwright user artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-user-artifacts
          path: |
            artifacts/ci-gate/e2e-user
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

  e2e-full-gate:
    name: E2E Full (required)
    runs-on: ubuntu-24.04
    needs: [e2e-review-srs, e2e-admin, e2e-user]
    if: always()

    steps:
      - name: Fail if review/SRS, admin, or user E2E failed
        env:
          REVIEW_SRS_RESULT: ${{ needs.e2e-review-srs.result }}
          ADMIN_RESULT: ${{ needs.e2e-admin.result }}
          USER_RESULT: ${{ needs.e2e-user.result }}
        run: |
          set -euo pipefail
          if [ "${REVIEW_SRS_RESULT}" != "success" ]; then
            echo "Review/SRS result: ${REVIEW_SRS_RESULT}"
            exit 1
          fi
          if [ "${ADMIN_RESULT}" != "success" ]; then
            echo "Admin result: ${ADMIN_RESULT}"
            exit 1
          fi
          if [ "${USER_RESULT}" != "success" ]; then
            echo "User result: ${USER_RESULT}"
            exit 1
          fi
