name: Lexicon OpenAI-Compatible Smoke

on:
  workflow_dispatch:
    inputs:
      seed_words:
        description: Tiny seed list for bounded smoke runs
        required: false
        default: run
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: read

concurrency:
  group: lexicon-openai-compatible-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lexicon-openai-compatible-smoke:
    name: Lexicon OpenAI-Compatible Smoke (manual/nightly)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.event_name != 'pull_request'
    environment: lexicon-llm
    env:
      NLTK_DATA: ~/.cache/nltk_data
      LEXICON_LLM_BASE_URL: ${{ vars.LEXICON_LLM_BASE_URL }}
      LEXICON_LLM_MODEL: ${{ vars.LEXICON_LLM_MODEL }}
      LEXICON_LLM_API_KEY: ${{ secrets.LEXICON_LLM_API_KEY }}
      LEXICON_LLM_TRANSPORT: ${{ vars.LEXICON_LLM_TRANSPORT }}
      LEXICON_SEED_WORDS: ${{ github.event.inputs.seed_words || 'run' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            tools/lexicon/requirements.txt
            tools/lexicon/requirements-dev.txt

      - name: Cache WordNet corpora
        uses: actions/cache@v4
        with:
          path: ~/.cache/nltk_data
          key: ${{ runner.os }}-nltk-wordnet-v1

      - name: Validate lexicon enrichment configuration
        run: |
          set -euo pipefail
          : "${LEXICON_LLM_BASE_URL:?GitHub environment/repository variable LEXICON_LLM_BASE_URL is required}"
          : "${LEXICON_LLM_MODEL:?GitHub environment/repository variable LEXICON_LLM_MODEL is required}"
          : "${LEXICON_LLM_API_KEY:?GitHub environment/repository secret LEXICON_LLM_API_KEY is required}"
          echo "Using protected environment: lexicon-llm"
          echo "LLM base URL configured: ${LEXICON_LLM_BASE_URL}"
          echo "LLM model configured: ${LEXICON_LLM_MODEL}"
          echo "LLM transport configured: ${LEXICON_LLM_TRANSPORT:-python-default}"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tools/lexicon/package-lock.json

      - name: Install lexicon dependencies
        run: pip install -r tools/lexicon/requirements-dev.txt

      - name: Install lexicon Node dependencies
        run: npm --prefix tools/lexicon ci

      - name: Download WordNet corpora
        run: python -m nltk.downloader -d "$NLTK_DATA" wordnet omw-1.4

      - name: Run lexicon pytest suite
        run: python -m pytest tools/lexicon/tests -q

      - name: Run bounded OpenAI-compatible smoke flow
        env:
          LEXICON_SKIP_VENV_GUARD: "1"
        run: |
          set -euo pipefail
          smoke_dir="${RUNNER_TEMP}/lexicon-openai-compatible-smoke"
          smoke_log="$smoke_dir/smoke.log"
          provider_mode='openai_compatible'
          if [ "${LEXICON_LLM_TRANSPORT:-}" = 'node' ]; then
            provider_mode='openai_compatible_node'
          fi
          rm -rf "$smoke_dir"
          mkdir -p "$smoke_dir"
          read -r -a seed_words <<< "${LEXICON_SEED_WORDS}"
          echo "Provider mode: $provider_mode" | tee "$smoke_log"
          echo "Seed words: ${LEXICON_SEED_WORDS}" | tee -a "$smoke_log"
          set +e
          python -m tools.lexicon.cli smoke-openai-compatible --provider-mode "$provider_mode" --output-dir "$smoke_dir" --max-words 1 --max-senses 2 "${seed_words[@]}" 2>&1 | tee -a "$smoke_log"
          smoke_exit=${PIPESTATUS[0]}
          set -e
          if [ "$smoke_exit" -ne 0 ]; then
            if grep -Eqi 'Just a moment|__cf_chl|Enable JavaScript and cookies to continue|<title>Just a moment' "$smoke_log"; then
              echo
              echo 'Detected Cloudflare challenge HTML instead of an API response.'
              echo 'This usually means the endpoint is blocking the GitHub-hosted runner, not that the API key/model/base URL is missing.'
              echo 'Recommended actions:'
              echo '  1. Set LEXICON_LLM_TRANSPORT=node for Cloudflare-fronted OpenAI-compatible gateways.'
              echo '  2. If node transport still fails, use a self-hosted runner or allowlist/bypass the GitHub runner for the API path.'
              echo '  3. Confirm the values are configured in the lexicon-llm GitHub environment, not only in a local .env file.'
            fi
            exit "$smoke_exit"
          fi
          test -f "$smoke_dir/words.enriched.jsonl"
          python - <<'PY' "$smoke_dir/words.enriched.jsonl"
          import json
          import sys
          from pathlib import Path

          rows = [json.loads(line) for line in Path(sys.argv[1]).read_text(encoding="utf-8").splitlines() if line.strip()]
          assert rows, "expected at least one compiled word row"
          phonetics = rows[0]["phonetics"]
          assert set(phonetics.keys()) == {"us", "uk", "au"}
          assert all(isinstance(phonetics[accent]["ipa"], str) and phonetics[accent]["ipa"] for accent in ("us", "uk", "au"))
          PY

      - name: Summarize workflow scope
        if: always()
        run: |
          {
            echo "## Lexicon OpenAI-compatible smoke"
            echo
            echo "- Validates secret-backed OpenAI-compatible endpoint enrichment in the protected GitHub environment `lexicon-llm`."
            echo "- Downloads WordNet corpora and runs a bounded offline lexicon smoke flow."
            echo "- Calls the configured OpenAI-compatible endpoint through the real lexicon enrichment client."
            echo "- For Cloudflare-fronted gateways, prefer `LEXICON_LLM_TRANSPORT=node`; if GitHub-hosted runners are still challenged, use a self-hosted runner or gateway allow/bypass rules."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload lexicon smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lexicon-openai-compatible-smoke-artifacts
          path: |
            ${{ runner.temp }}/lexicon-openai-compatible-smoke
          if-no-files-found: ignore
