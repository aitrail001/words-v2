services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${TEST_DB_NAME:-words_test}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${POSTGRES_PORT:-0}:5432"
    volumes:
      - pgdata_gate:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${TEST_DB_NAME:-words_test}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8
    container_name: ${COMPOSE_PROJECT_NAME:-wordsv2-pr}-redis
    ports:
      - "${REDIS_PORT:-0}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redisdata_gate:/data

volumes:
  pgdata_gate:
  redisdata_gate:
  words_uploads_data:
