services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:18002/api
      - BACKEND_URL=http://host.docker.internal:18002/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /workspace/e2e
    command: sh -lc "tail -f /dev/null"
    environment:
      - CI=true
      - E2E_BASE_URL=http://frontend:3000
      - E2E_API_URL=http://host.docker.internal:18002/api
      - E2E_DB_NAME=vocabapp_epub_20260402
      - E2E_DB_PASSWORD=change_this_password_in_production
    volumes:
      - ./:/workspace
    depends_on:
      - frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  frontend_node_modules:
  frontend_next:
