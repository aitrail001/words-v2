services:
  test-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vocabapp
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: vocabapp_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocabapp"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://vocabapp:testpass@test-db:5432/vocabapp_test
      - DATABASE_URL_SYNC=postgresql://vocabapp:testpass@test-db:5432/vocabapp_test
      - REDIS_URL=redis://test-redis:6379
      - ENVIRONMENT=test
      - JWT_SECRET=test-secret
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "pip install -q -r requirements-test.txt && pytest -q"
